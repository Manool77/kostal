- name: Build for x86_64 (Synology DS418play / Intel J3355)
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: '0'
        run: |
          go build -ldflags="-w -s" -o kostal_amd64 ./cmd/frame/

      - name: Upload binary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: kostal-amd64-synology
          path: |
            kostal_amd64
            web/
            forecasts.json
          retention-days: 30
